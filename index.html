<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIAR - Cyberpunk Launch</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #050505;
      color: #ffffff;
    }
    .header-section {
      text-align: center;
      padding: 60px 20px;
      position: relative;
      overflow: hidden;
      min-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Cyberpunk HUD as background */
    .background-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      object-fit: cover;
    }

    .content-layer { position: relative; z-index: 1; width: 100%; max-width: 600px; }
    .logo-text { font-size: 3.5rem; font-weight: 800; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0, 162, 255, 0.8); }
    .subtitle { font-size: 0.8rem; color: #00a2ff; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
    
    .button-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
    .action-btn { padding: 15px 25px; border-radius: 30px; background-color: #ffffff; color: #000000; text-decoration: none; font-weight: bold; display: flex; align-items: center; }
    
    .bottom-section { background-color: #ffffff; color: #111111; padding: 60px 20px; display: flex; justify-content: center; gap: 40px; }
    .info-card { max-width: 350px; background: #f8f9fa; padding: 30px; border-radius: 12px; }
  </style>
</head>
<body>

  <div class="header-section">
    <svg class="background-animation" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
      </defs>
      <rect width="100%" height="100%" fill="#090a0f"/>
      <line x1="0" y1="0" x2="800" y2="0" stroke="#38ef7d" stroke-width="2" opacity="0.4"><animate attributeName="y1" values="20; 380; 20" dur="6s" repeatCount="indefinite" /><animate attributeName="y2" values="20; 380; 20" dur="6s" repeatCount="indefinite" /></line>
      <g transform="translate(400, 200)">
        <circle r="120" stroke="#00f2fe" stroke-width="2" fill="none" stroke-dasharray="10 20 60 10" filter="url(#neon-glow)"><animateTransform attributeName="transform" type="rotate" values="360; 0" dur="20s" repeatCount="indefinite" /></circle>
        <circle r="80" stroke="#ff0055" stroke-width="3" fill="none" stroke-dasharray="2 8" opacity="0.6"><animateTransform attributeName="transform" type="rotate" values="360; 0" dur="15s" repeatCount="indefinite" /></circle>
        <polygon points="0,-45 39,22.5 -39,22.5" stroke="#38ef7d" stroke-width="1.5" fill="none" opacity="0.4"><animateTransform attributeName="transform" type="rotate" values="0; 360" dur="8s" repeatCount="indefinite" /></polygon>
      </g>
    </svg>

    <div class="content-layer">
      <div class="logo-text">VIAR</div>
      <div class="subtitle">Company To Grow</div>
      <div class="button-container">
        <a href="#" class="action-btn">Contact</a>
        <a href="#" class="action-btn">Phone</a>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="info-card"><h3>Services</h3><p>Custom simulations and data-driven interactive tools.</p></div>
  </div>

</body>
</html>
